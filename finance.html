<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script>
window.onerror = function (msg, src, line) {
  console.error('[Error]', msg, line);
  return true;
};
window.onunhandledrejection = function (e) {
  console.error('[Promise]', e.reason);
  e.preventDefault();
};
</script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Finances</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --bg: #0A0A0B;
  --bg-deep: #050506;
  --bg-card: rgba(255, 255, 255, 0.04);
  --bg-secondary: rgba(255, 255, 255, 0.035);
  --glass-bg: rgba(255, 255, 255, 0.04);
  --glass-border: transparent;
  --glass-border-strong: transparent;
  --glass-shadow:
    0 1px 0 0 rgba(255, 255, 255, 0.06) inset,
    0 12px 40px rgba(0, 0, 0, 0.45),
    0 1px 2px rgba(0, 0, 0, 0.25);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;
  --border: transparent;
  --border-soft: transparent;
  --accent: #E07658;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color-scheme: dark;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

/* Backdrop — black with subtle warm + cool washes */
body::before {
  content: '';
  position: fixed;
  inset: -10%;
  z-index: -2;
  background:
    radial-gradient(60% 45% at 82% 14%, rgba(224, 118, 88, 0.16) 0%, transparent 55%),
    radial-gradient(55% 45% at 18% 90%, rgba(180, 180, 200, 0.06) 0%, transparent 55%),
    linear-gradient(180deg, #0A0A0B 0%, #050506 100%);
  filter: blur(40px) saturate(1.05);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.7;
  pointer-events: none;
}

.shell {
  max-width: 880px;
  margin: 0 auto;
  padding: 24px 16px 100px;   /* extra bottom padding so tab bar doesn't cover content */
}

/* ===== Back to dashboard ===== */
.fin-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px 8px 10px;
  margin: 0 0 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 999px;
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease, color 0.15s ease;
}
.fin-back-btn:hover, .fin-back-btn:active {
  background: rgba(255,255,255,0.07);
  color: var(--text-primary);
}
.fin-back-btn svg { display: block; }

/* Hide scrollbars everywhere */
html, body { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0 !important; height: 0 !important; display: none !important; }

/* Section title with reorder controls */
.section { margin-bottom: 18px; }
.section-title {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-title::before {
  content: '';
  width: 18px;
  height: 1px;
  background: var(--text-tertiary);
  opacity: 0.6;
}
.section-title-text { display: inline-flex; align-items: center; gap: 8px; }
.section-title-text::before {
  content: '⚡';
  font-size: 14px;
  color: var(--text-tertiary);
  opacity: 0.5;
}
.section-reorder { display: inline-flex; gap: 6px; opacity: 0.5; }
.section-reorder button {
  background: transparent;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 12px;
  padding: 0 4px;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.section-reorder button:hover { color: var(--text-primary); }
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
}

/* Card */
.card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  margin-bottom: 10px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: var(--glass-shadow);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 14px; right: 14px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
  pointer-events: none;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

/* Tag pills */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10.5px;
  padding: 3px 9px 3px 8px;
  border-radius: 999px;
  margin: 2px;
  font-weight: 700;
  letter-spacing: 0.04em;
  border: none;
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  text-transform: uppercase;
}
.tag::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
  background: rgba(255,255,255,0.30);
}
.tag-green::before { background: #6BE3A4; box-shadow: 0 0 6px rgba(107,227,164,0.55); }
.tag-green { background: rgba(107, 227, 164, 0.10); color: #8EE9B7; }
.pill-group { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }

/* Empty state */
.empty-state {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  text-align: center;
  padding: 16px 0;
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.empty-state::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-quaternary);
  flex-shrink: 0;
}

/* Quick-add composer */
.quick-add {
  display: flex;
  gap: 6px;
  align-items: stretch;
  margin-top: 10px;
  padding: 4px;
  background: rgba(0, 0, 0, 0.30);
  border-radius: 12px;
  border: none;
}
.quick-add input,
.quick-add input[type="text"],
.quick-add input[type="number"],
.quick-add input[type="date"],
.quick-add select {
  flex: 1;
  min-width: 0;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  padding: 9px 12px;
  font-family: inherit;
  font-size: 14px;
}
.quick-add input::placeholder { color: var(--text-tertiary); }
.quick-add-btn {
  padding: 0 14px;
  background: rgba(255,255,255,0.06);
  border: none;
  color: var(--text-secondary);
  border-radius: 9px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
.quick-add-btn:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }
.quick-add-btn:active { transform: scale(0.96); }

/* Custom list rows */
.custom-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  background: rgba(255,255,255,0.025);
  border: none;
  border-radius: 10px;
  margin-bottom: 5px;
  font-size: 13px;
  color: var(--text-primary);
}
.custom-item:hover { background: rgba(255,255,255,0.05); }
.custom-item .item-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.30);
  flex-shrink: 0;
}
.custom-item span { flex: 1; word-break: break-word; }
.custom-item .delete-x {
  background: transparent;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 6px;
  opacity: 0.5;
}
.custom-item:hover .delete-x { opacity: 1; }
.custom-item .delete-x:hover { color: #FF8A8A; background: rgba(255,138,138,0.10); }

/* Inline label eyebrow */
.label {
  font-size: 9.5px;
  color: var(--text-tertiary);
  margin-bottom: 10px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-family: var(--font-mono);
}

/* ===== Income / Expenses / Net ===== */
.fin-stat-card { text-align: center; }
.fin-stat-value {
  font-size: 22px; font-weight: 700; margin-top: 4px;
  font-variant-numeric: tabular-nums; font-family: var(--font-mono);
}
.fin-stat-income { color: #6BE3A4; }
.fin-stat-expense { color: #FF6B6B; }
.fin-add-btn {
  width: 100%; padding: 12px; border: 0; border-radius: 12px;
  background: linear-gradient(180deg,#FFFFFF,#E8E5DD); color: #0A0A0B;
  font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
  transition: filter 0.15s;
}
.fin-add-btn:hover { filter: brightness(1.05); }
.fin-type-select {
  flex: 1; min-width: 90px; background: transparent; border: none; outline: none;
  color: var(--text-primary); padding: 9px 12px; font-family: inherit; font-size: 14px;
}
.fin-entry-amount { font-family: var(--font-mono); font-weight: 700; white-space: nowrap; }

/* ============================================================
   DATE FIELDS — wrap each date input in a label that shows a
   📅 emoji prefix so it's obvious what the field is. The native
   picker icon gets a dark-mode filter so it shows up on the
   dark background instead of vanishing into it.
   ============================================================ */
.date-field {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  background: var(--bg-card);
  border: 0.5px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-md);
  font-family: inherit;
  color: var(--text-primary);
  min-width: 0;
  cursor: pointer;
}
.date-field .date-emoji {
  font-size: 15px;
  line-height: 1;
  flex-shrink: 0;
}
.date-field input[type="date"] {
  background: transparent !important;
  border: none !important;
  outline: none;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  padding: 0 !important;
  margin: 0 !important;
  min-width: 0;
  flex: 1;
  width: 100%;
  color-scheme: dark;
}
input[type="date"] { color-scheme: dark; }
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.85);
  opacity: 0.7;
  cursor: pointer;
}
@media (max-width: 600px) {
  .date-field {
    width: 100%;
    padding: 12px 14px;
  }
  .date-field input[type="date"] { font-size: 15px !important; }
}

/* ===== iPhone 12 Mini and similarly narrow phones ===== */
@media (max-width: 390px) {
  body { font-size: 14px; padding-left: 12px; padding-right: 12px; }
}

/* ===== Sync status dot ===== */
.sync-dot {
  position: fixed; top: 12px; right: 12px; z-index: 250;
  width: 9px; height: 9px; border-radius: 50%;
  background: #6BE3A4; box-shadow: 0 0 6px rgba(107,227,164,0.7);
}
.sync-dot.offline {
  background: #FF5C5C; box-shadow: 0 0 6px rgba(255,92,92,0.7);
  animation: sync-pulse 1.6s ease-in-out infinite;
}
@keyframes sync-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="shell">

<!-- ===== BACK BUTTON ===== -->
<span class="sync-dot" id="syncDot" title="Sync status"></span>
<a href="index.html" class="fin-back-btn" id="finBackBtn" aria-label="Back to dashboard">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
  <span>Back</span>
</a>

<!-- ===== ÜBERSICHT: Einnahmen / Ausgaben / Netto ===== -->
<div class="section">
  <div class="section-title"><span class="section-title-text">ÜBERSICHT</span></div>
  <div class="card-grid">
    <div class="card fin-stat-card">
      <div class="label">Einnahmen</div>
      <div class="fin-stat-value fin-stat-income" id="finIncomeTotal">CHF 0.00</div>
    </div>
    <div class="card fin-stat-card">
      <div class="label">Ausgaben</div>
      <div class="fin-stat-value fin-stat-expense" id="finExpenseTotal">CHF 0.00</div>
    </div>
    <div class="card fin-stat-card">
      <div class="label">Netto</div>
      <div class="fin-stat-value" id="finNetTotal">CHF 0.00</div>
    </div>
  </div>
</div>

<!-- ===== EINTRÄGE ===== -->
<div class="section">
  <div class="section-title"><span class="section-title-text">EINTRÄGE</span></div>
  <div class="card">
    <button type="button" class="fin-add-btn" id="finAddOpenBtn">+ Eintrag</button>
    <div class="quick-add" id="finAddRow" style="display:none; flex-wrap:wrap; margin-top:10px;">
      <select id="finEntryType" class="fin-type-select">
        <option value="income">Einnahme</option>
        <option value="expense">Ausgabe</option>
      </select>
      <input type="text" id="finEntryDesc" placeholder="Beschreibung">
      <input type="number" id="finEntryAmount" placeholder="Betrag" min="0" step="0.01">
      <input type="date" id="finEntryDate">
      <button type="button" class="quick-add-btn" id="finEntryAddBtn">Hinzufügen</button>
    </div>
    <div id="finEntryList" style="margin-top:10px;"></div>
    <div class="empty-state" id="finEntryEmpty">Noch keine Einträge</div>
  </div>
</div>

</div>

<script>
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);
  const KEY = 'finance_entries';

  function loadEntries() {
    try { const v = JSON.parse(localStorage.getItem(KEY)); return Array.isArray(v) ? v : []; }
    catch (e) { return []; }
  }
  function saveEntries(list) {
    try { localStorage.setItem(KEY, JSON.stringify(list)); } catch (e) {}
  }
  function fmt(n) {
    return 'CHF ' + (Math.round((Number(n) || 0) * 100) / 100).toLocaleString('de-CH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function render() {
    const entries = loadEntries().slice().sort((a, b) => (b.date || '').localeCompare(a.date || '') || (b.ts || 0) - (a.ts || 0));
    let income = 0, expense = 0;
    entries.forEach((e) => {
      if (!e) return;
      if (e.type === 'income') income += Number(e.amount) || 0;
      else expense += Number(e.amount) || 0;
    });
    $('finIncomeTotal').textContent = fmt(income);
    $('finExpenseTotal').textContent = fmt(expense);
    const net = income - expense;
    const netEl = $('finNetTotal');
    netEl.textContent = (net < 0 ? '-' : '') + fmt(Math.abs(net));
    netEl.style.color = net >= 0 ? '#6BE3A4' : '#FF6B6B';

    const listEl = $('finEntryList');
    listEl.innerHTML = '';
    $('finEntryEmpty').style.display = entries.length ? 'none' : 'flex';
    entries.forEach((entry) => {
      if (!entry) return;
      const row = document.createElement('div');
      row.className = 'custom-item';

      const dot = document.createElement('span');
      dot.className = 'item-dot';
      dot.style.background = entry.type === 'income' ? '#6BE3A4' : '#FF6B6B';

      const label = document.createElement('span');
      const desc = entry.description ? entry.description : '(ohne Beschreibung)';
      label.textContent = desc + (entry.date ? ' · ' + entry.date : '');

      const amount = document.createElement('span');
      amount.className = 'fin-entry-amount ' + (entry.type === 'income' ? 'fin-stat-income' : 'fin-stat-expense');
      amount.textContent = (entry.type === 'income' ? '+' : '−') + fmt(entry.amount);

      const del = document.createElement('button');
      del.className = 'delete-x';
      del.type = 'button';
      del.setAttribute('aria-label', 'Eintrag löschen');
      del.textContent = '×';
      del.addEventListener('click', () => {
        saveEntries(loadEntries().filter((x) => x && x.id !== entry.id));
        render();
      });

      row.appendChild(dot);
      row.appendChild(label);
      row.appendChild(amount);
      row.appendChild(del);
      listEl.appendChild(row);
    });
  }

  $('finAddOpenBtn').addEventListener('click', () => {
    const row = $('finAddRow');
    const showing = row.style.display !== 'none';
    row.style.display = showing ? 'none' : 'flex';
    if (!showing) {
      $('finEntryDate').value = new Date().toISOString().slice(0, 10);
      $('finEntryDesc').focus();
    }
  });

  function addEntry() {
    const amount = parseFloat($('finEntryAmount').value);
    if (!amount || amount <= 0) return;
    const entries = loadEntries();
    entries.push({
      id: 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      type: $('finEntryType').value === 'income' ? 'income' : 'expense',
      amount: amount,
      description: $('finEntryDesc').value.trim(),
      date: $('finEntryDate').value || new Date().toISOString().slice(0, 10),
      ts: Date.now(),
    });
    saveEntries(entries);
    $('finEntryDesc').value = '';
    $('finEntryAmount').value = '';
    render();
  }
  $('finEntryAddBtn').addEventListener('click', addEntry);
  $('finEntryAmount').addEventListener('keydown', (e) => { if (e.key === 'Enter') addEntry(); });
  $('finEntryDesc').addEventListener('keydown', (e) => { if (e.key === 'Enter') addEntry(); });

  render();
  window.addEventListener('storage', render);
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'finance',
    syncedKeys: ['finance_entries'],
    onApplied: function () {
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>

<script>
(function () {
  'use strict';
  function goBackToDashboard() {
    document.body.style.transition = 'opacity 150ms ease';
    document.body.style.opacity = '0';
    setTimeout(() => { window.location.href = 'index.html'; }, 150);
  }
  const backBtn = document.getElementById('finBackBtn');
  if (backBtn) backBtn.addEventListener('click', (e) => { e.preventDefault(); goBackToDashboard(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') goBackToDashboard(); });

  function setSyncDot(state) {
    const dot = document.getElementById('syncDot');
    if (dot) dot.classList.toggle('offline', state === 'red');
  }
  window.addEventListener('online', () => setSyncDot('green'));
  window.addEventListener('offline', () => setSyncDot('red'));
  setSyncDot(navigator.onLine ? 'green' : 'red');
})();
</script>

</body>
</html>
